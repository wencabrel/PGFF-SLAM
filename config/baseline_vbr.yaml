# Baseline configuration (no PGFF enhancements) - WITH UI
common:
  dataset: "vbr"
  lidar_topic: "/ouster/points"
  livox_lidar_topic: "/livox/lidar"
  imu_topic: "/imu/data"

fasterlio:
  lidar_type: 3
  scan_line: 32
  blind: 0.5
  time_scale: 1e-3
  skip_lidar_num: 0
  point_filter_num: 10
  max_iteration: 6
  filter_size_scan: 0.5
  filter_size_map: 0.5
  ivox_grid_resolution: 0.5
  ivox_nearby_type: 18
  esti_plane_threshold: 0.1
  use_aa: true
  acc_cov: 0.1
  gyr_cov: 0.1
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001
  extrinsic_est_en: false
  extrinsic_T: [ 0, 0, 0 ]
  extrinsic_R: [ 1, 0, 0, 0, 1, 0, 0, 0, 1 ]
  keep_first_imu_estimation: true
  
  # DISABLE PGFF for baseline
  enable_pgff: false

g2p5:
  esti_floor: false
  lidar_height: 0.0
  floor_height: -1.2
  min_th_floor: 0.50
  max_th_floor: 1.0
  grid_map_resolution: 0.2

system:
  with_loop_closing: true
  with_ui: true
  with_2dui: false
  with_g2p5: true
  step_on_kf: false
  enable_lidar_loc_skip: false
  enable_lidar_loc_rviz: false
  enable_lidar_odom_skip: false
  lidar_loc_skip_num: 4
  lidar_odom_skip_num: 0
  map_path: ./data/new_map/
  pub_tf: true

loop_closing:
  loop_kf_gap: 20
  min_id_interval: 20
  closest_id_th: 50
  max_range: 30.0
  ndt_score_th: 1.0
  with_height: true
